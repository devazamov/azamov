# Render.com backend deploy konfiguratsiyasi
# https://render.com -> New -> Blueprint -> shu reponi tanlang
services:
  - type: web
    name: azamov-backend
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SECRET
        generateValue: true   # Render avtomatik maxfiy kalit yaratadi
      - key: NODE_VERSION
        value: "24"
